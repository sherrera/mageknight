<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mage Knight — Collection</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"
    ></script>

    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/mini-card.css" />
    <link rel="stylesheet" href="./styles/collection.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-header__title">Mage Knight</h1>
      <nav class="app-header__nav">
        <a href="/">Browse</a>
        <a href="/collection.html" class="active">Collection</a>
        <a href="/armies.html" data-public-hide>Army Builder</a>
        <a href="/abilities.html" data-public-hide>Abilities</a>
      </nav>
      <div class="app-header__actions">
        <sl-icon-button id="btn-stat-tiers" name="palette" label="Toggle stat highlighting"></sl-icon-button>
        <sl-icon-button id="btn-dark-mode" name="moon" label="Toggle dark mode"></sl-icon-button>
      </div>
    </header>

    <main class="collection-layout">
      <!-- ----------------------------------------------------------------
           Filter sidebar — populated at runtime by filter-panel.ts so
           the same component can be reused across Browse and Collection.
           ---------------------------------------------------------------- -->
      <aside class="filters" id="filter-container"></aside>

      <!-- ----------------------------------------------------------------
           Right column — title, count, and card grid
           ---------------------------------------------------------------- -->
      <div>
        <div class="results-header">
          <sl-button id="btn-filter-toggle" class="btn-filter-toggle" size="small" variant="default" outline>
            <sl-icon slot="prefix" name="funnel"></sl-icon>Filters
          </sl-button>
          <div class="results-info">
            <h2 class="collection-title">My Collection</h2>
            <p class="results-count" id="results-count">Loading…</p>
          </div>
          <div class="results-sort">
            <sl-select id="filter-sort-by" size="small" value="name" style="width: 150px">
              <sl-option value="name">Name</sl-option>
              <sl-option value="point_cost">Cost</sl-option>
              <sl-option value="set_name">Set</sl-option>
              <sl-option value="rank">Rank</sl-option>
              <sl-option value="overall_score">Overall Score</sl-option>
              <sl-option value="peak_score">Peak Score</sl-option>
              <sl-option value="sustained_score">Sustained Score</sl-option>
            </sl-select>
            <sl-button-group>
              <sl-button id="btn-sort-asc"  size="small" variant="primary">↑</sl-button>
              <sl-button id="btn-sort-desc" size="small" variant="default">↓</sl-button>
            </sl-button-group>
          </div>
          <sl-icon-button
            id="btn-history"
            name="clock-history"
            label="View transaction history"
            title="Transaction history"
            data-public-hide
          ></sl-icon-button>
        </div>

        <div class="cards-grid" id="cards-grid">
          <p class="state-message">Loading collection…</p>
        </div>
      </div>
    </main>

    <!-- Army picker modal — shown when "Add to army" is clicked on a card -->
    <sl-dialog id="army-picker-dialog" label="Add to Army" style="--width: 420px">
      <div id="army-picker-list"></div>
      <sl-button slot="footer" id="btn-close-army-picker" variant="default">Cancel</sl-button>
    </sl-dialog>

    <!-- Transaction history modal — populated by collection.ts -->
    <sl-dialog id="history-dialog" label="Collection History" style="--width: 520px">
      <div id="history-list"></div>
      <div slot="footer" class="history-footer">
        <sl-button id="btn-clear-history" variant="default" size="small" outline>
          Clear history
        </sl-button>
        <sl-button id="btn-close-history" variant="primary" size="small">
          Close
        </sl-button>
      </div>
    </sl-dialog>

    <script type="module" src="./collection.ts"></script>
  </body>
</html>
