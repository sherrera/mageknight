<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mage Knight — Army Builder</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/mini-card.css" />
    <link rel="stylesheet" href="./styles/armies.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-header__title">Mage Knight</h1>
      <nav class="app-header__nav">
        <a href="/">Browse</a>
        <a href="/collection.html">Collection</a>
        <a href="/armies.html" class="active">Army Builder</a>
        <a href="/abilities.html">Abilities</a>
      </nav>
      <div class="app-header__actions">
        <sl-icon-button id="btn-stat-tiers" name="palette" label="Toggle stat highlighting"></sl-icon-button>
        <a href="https://github.com/sherrera/mageknight" target="_blank" rel="noopener" aria-label="GitHub"><sl-icon name="github"></sl-icon></a>
        <sl-icon-button id="btn-dark-mode" name="moon" label="Toggle dark mode"></sl-icon-button>
      </div>
    </header>

    <main class="army-layout">
      <!-- Filter sidebar — same shared component as Browse and Collection -->
      <aside class="filters" id="filter-container"></aside>

      <div class="army-main">
        <!-- ----------------------------------------------------------------
             Back link + army name/description/points header
             ---------------------------------------------------------------- -->
        <div style="margin-bottom:var(--sl-spacing-small)">
          <a href="/armies.html" style="font-size:var(--sl-font-size-small);color:var(--sl-color-neutral-500);text-decoration:none">
            ← Back to armies
          </a>
        </div>

        <div id="army-header-content"></div>

        <!-- ----------------------------------------------------------------
             Army roster — compact list of minis currently in the army
             ---------------------------------------------------------------- -->
        <div class="army-roster-section">
          <p class="army-section-label">In this army</p>
          <div id="army-roster">
            <p class="roster-empty">No miniatures in this army yet.</p>
          </div>
        </div>

        <!-- ----------------------------------------------------------------
             Collection section — filterable grid, click to add to army
             ---------------------------------------------------------------- -->
        <div class="collection-section-header">
          <p class="army-section-label" style="margin:0">Your collection</p>
          <span class="results-count" id="results-count"></span>
          <div class="results-sort">
            <sl-select id="filter-sort-by" size="small" value="name" style="width: 150px">
              <sl-option value="name">Name</sl-option>
              <sl-option value="point_cost">Cost</sl-option>
              <sl-option value="set_name">Set</sl-option>
              <sl-option value="rank">Rank</sl-option>
              <sl-option value="overall_score">Overall Score</sl-option>
              <sl-option value="peak_score">Peak Score</sl-option>
              <sl-option value="sustained_score">Sustained Score</sl-option>
            </sl-select>
            <sl-button-group>
              <sl-button id="btn-sort-asc"  size="small" variant="primary">↑</sl-button>
              <sl-button id="btn-sort-desc" size="small" variant="default">↓</sl-button>
            </sl-button-group>
          </div>
        </div>

        <div class="cards-grid" id="cards-grid">
          <p class="state-message">Loading collection…</p>
        </div>
      </div>
    </main>

    <script type="module" src="./army.ts"></script>
  </body>
</html>
